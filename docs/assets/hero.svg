<svg width="100%" viewBox="0 0 900 280" xmlns="http://www.w3.org/2000/svg" role="img">
<title>prompt-injection-lab — one instrument, one measurement path</title>
<desc>Four prompt-injection and jailbreak benchmarks funnel through a single shared measurement path into an attack-success-rate figure reported with a confidence interval.</desc>
<style>
  .ts    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; fill: #444441; }
  .tl    { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 12px; font-weight: 600; fill: #534AB7; letter-spacing: 2px; }
  .title { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 30px; font-weight: 600; fill: #2C2C2A; }
  .glab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 500; fill: #888780; letter-spacing: 0.5px; }
  .blab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 600; fill: #444441; }
  .plab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 11px; font-weight: 600; fill: #534AB7; }
  .olab  { font-family: -apple-system, "Helvetica Neue", "Hiragino Sans", sans-serif; font-size: 13px; font-weight: 600; fill: #0F6E56; }
  .gray-fill   { fill: #F1EFE8; stroke: #C7C5BD; stroke-width: 0.6; }
  .purple-fill { fill: #EEEDFE; stroke: #534AB7; stroke-width: 0.6; }
  .teal-fill   { fill: #E1F5EE; stroke: #0F6E56; stroke-width: 0.6; }
  .arrd { stroke: #534AB7; stroke-width: 1.6; fill: none; }
  .ci   { stroke: #0F6E56; stroke-width: 2; fill: none; stroke-linecap: round; }
  @media (prefers-color-scheme: dark) {
    .ts    { fill: #C7C5BD; }
    .tl    { fill: #AFA9EC; }
    .title { fill: #E5E5E2; }
    .glab  { fill: #8C8B85; }
    .blab  { fill: #C7C5BD; }
    .plab  { fill: #AFA9EC; }
    .olab  { fill: #5DCAA5; }
    .gray-fill   { fill: #3A3A37; stroke: #5F5E5A; }
    .purple-fill { fill: #534AB7; stroke: #AFA9EC; }
    .teal-fill   { fill: #0F6E56; stroke: #5DCAA5; }
    .arrd { stroke: #AFA9EC; }
    .ci   { stroke: #5DCAA5; }
  }
</style>
<defs>
<marker id="arrowAccent" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
  <path d="M2 1L8 5L2 9" fill="none" stroke="#534AB7" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
</marker>
</defs>

<!-- title block (left) -->
<text class="tl"    x="44" y="92">MEASUREMENT PLATFORM · LLM SAFETY</text>
<text class="title" x="42" y="136">prompt-injection-lab</text>
<text class="ts"    x="44" y="170">One instrument, one measurement path — every benchmark,</text>
<text class="ts"    x="44" y="190">every model, on the same statistics and the same conditions.</text>

<!-- MOTIF (right): four benchmarks funnel through one path into ASR + CI -->
<!-- four benchmark boxes -->
<rect class="gray-fill"   x="486" y="58"  width="118" height="26" rx="5"/>
<rect class="gray-fill"   x="486" y="92"  width="118" height="26" rx="5"/>
<rect class="gray-fill"   x="486" y="126" width="118" height="26" rx="5"/>
<rect class="gray-fill"   x="486" y="160" width="118" height="26" rx="5"/>
<text class="blab" x="497" y="75">AdvBench</text>
<text class="blab" x="497" y="109">HarmBench</text>
<text class="blab" x="497" y="143">StrongREJECT</text>
<text class="blab" x="497" y="177">JBB</text>

<!-- converging arrows into the single path -->
<path d="M604 71  C 640 71,  650 118, 686 122" class="arrd" marker-end="url(#arrowAccent)"/>
<path d="M604 105 C 636 105, 652 120, 686 122" class="arrd" marker-end="url(#arrowAccent)"/>
<path d="M604 139 C 636 139, 652 124, 686 126" class="arrd" marker-end="url(#arrowAccent)"/>
<path d="M604 173 C 640 173, 650 130, 686 126" class="arrd" marker-end="url(#arrowAccent)"/>

<!-- single measurement path -->
<rect class="purple-fill" x="690" y="98" width="58" height="52" rx="7"/>
<text class="plab" x="705" y="120">one</text>
<text class="plab" x="700" y="136">path</text>

<!-- arrow to output -->
<path d="M748 124 H 792" class="arrd" marker-end="url(#arrowAccent)"/>

<!-- output: ASR + confidence interval -->
<rect class="teal-fill" x="796" y="98" width="72" height="52" rx="7"/>
<text class="olab" x="812" y="120">ASR</text>
<line class="ci" x1="808" y1="136" x2="856" y2="136"/>
<line class="ci" x1="808" y1="132" x2="808" y2="140"/>
<line class="ci" x1="856" y1="132" x2="856" y2="140"/>
<circle cx="830" cy="136" r="3" fill="#0F6E56"/>

<text class="glab" x="486" y="208">benchmarks</text>
<text class="glab" x="686" y="208">measure</text>
<text class="glab" x="796" y="208">ASR + CI</text>
</svg>
