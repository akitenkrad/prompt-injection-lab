# phase1-smoke — 高速 E2E 用の最小スイート（DESIGN §10 / IMPLEMENTATION_PLAN M10・M11）
#
# 各ベンチ数件・少試行で，`pil run --provider mock` → `pil report` を数秒で通す．
# ネットワーク非依存（provider = "mock"）．

name = "phase1-smoke"
description = "高速 E2E 用の最小スイート（mock・少件数・少試行）"

# 生成
provider = "mock"          # network-free（既定）．ollama は --features ollama 時のみ
model = "mock-1"
seed = 42
attempts = 3               # 多試行 ASR 曲線（asr@1, asr@3）を出すため 1 より大きく
concurrency = 4
temperature = 0.7          # 多試行は温度 > 0 の独立サンプルが望ましい（§11.4）
max_tokens = 128

# 攻撃バリアント（§5.6）．"default" 単独指定で pil_attacks::default_variants に展開できる．
# ここでは union coverage を示すため明示的に少数を並べる．
attacks = ["identity", "base64", "leetspeak", "refusal_suppression"]

# 測定器（§8.2）．LLM 判定器は Phase 1 では canned judge で配線（network-free）．
instruments = ["refusal_match", "harmbench_cls", "rubric_v1"]

# 対象ベンチ（先頭 limit 件）．jbb_benign を含めることで過剰拒否も測れる（§10）．
[[benches]]
name = "advbench"
limit = 6

[[benches]]
name = "jbb_harmful"
limit = 6

[[benches]]
name = "jbb_benign"
limit = 6

[[benches]]
name = "harmbench_text"
limit = 6

[[benches]]
name = "strongreject_full"
limit = 6
